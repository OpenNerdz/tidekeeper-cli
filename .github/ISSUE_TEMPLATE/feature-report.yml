name: Feature Request
description: Suggest a Tidekeeper CLI improvement.
title: "[FEATURE]: "
labels: enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please search existing issues first and keep the request focused.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should Tidekeeper do?
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Extra context
    validations:
      required: false
