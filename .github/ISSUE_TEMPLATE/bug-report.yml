name: Bug Report
description: Report a Tidekeeper bug.
title: "[BUG]: "
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Tidekeeper issue. Please search existing issues first.
        Redact tokens, cookies, account details, and personal information before posting logs.
  - type: dropdown
    id: tool
    attributes:
      label: Which entry point?
      options:
        - tidekeeper
        - tidekeeper-gui
        - tidal-dl
        - install.sh
        - Termux install
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Tidekeeper version or commit
      placeholder: "Example: latest main / commit SHA / pip version"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "Example: Windows 11, Ubuntu 24.04, macOS, Termux on Android 14"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us exactly what you ran.
      render: bash
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Full output / traceback
      description: Paste the full error output. Redact secrets first.
      render: text
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Add screenshots or extra context if useful.
    validations:
      required: false
