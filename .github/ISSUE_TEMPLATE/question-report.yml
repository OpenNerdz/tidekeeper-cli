name: Question
description: Ask a Tidekeeper CLI question.
title: "[QUESTION]: "
labels: question
body:
  - type: markdown
    attributes:
      value: |
        Please search existing issues first. Redact tokens and account details.
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Install
        - Termux
        - Login/auth
        - Downloading
        - Configuration
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Include relevant command output if applicable.
    validations:
      required: true
