name: Build exe

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip
        cache-dependency-path: TIDALDL-PY/requirements.txt

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install wheel pyinstaller
        python -m pip install -e .
      working-directory: TIDALDL-PY

    - name: Clean directory
      shell: bash
      run: |
        rm -rf dist
        rm -rf build
        rm -rf tidal_dl.egg-info
        rm -rf tidal_gui.egg-info
        rm -rf MANIFEST.in
      working-directory: TIDALDL-PY

    - name: Build tidekeeper
      run: |
        pyinstaller -F tidal_dl/__main__.py -n tidekeeper
      working-directory: TIDALDL-PY

    # - name: Build tidal-gui-macOs
    #   shell: bash
    #   if: ${{ matrix.os == 'macos-latest' }}
    #   run: |
    #     cp -rf guiStatic.in MANIFEST.in
    #     pyinstaller -F tidal_gui/__init__.py -w -n tidal-gui
    #     cp -rf tidal_gui/resource dist/
    #   working-directory: TIDALDL-PY

    # - name: Build tidal-gui
    #   shell: bash
    #   if: ${{ matrix.os != 'macos-latest' }}
    #   run: |
    #     cp -rf guiStatic.in MANIFEST.in
    #     pyinstaller -D tidal_gui/__init__.py -w -n tidal-gui
    #   working-directory: TIDALDL-PY

    # - name: Gzip tidal-gui
    #   shell: bash
    #   if: ${{ matrix.os != 'macos-latest' }}
    #   run: |
    #     cp -rf ../tidal_gui/resource ./tidal-gui/
    #     tar -zcvf tidal-gui.tar.gz tidal-gui
    #     rm -rf tidal-gui
    #   working-directory: TIDALDL-PY/dist

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tidekeeper-${{ runner.os }}
        path: |
          TIDALDL-PY/dist/*
